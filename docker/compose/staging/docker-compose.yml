# Staging: frontend only. Build and run with staging URLs.
# Usage (from project root): docker compose -f docker/compose/staging/docker-compose.yml --env-file docker/compose/staging/.env up -d --build

services:
  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:5002}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-http://localhost:5001}
        VITE_ASSEST_URL: ${VITE_ASSEST_URL:-http://localhost:5002}
    image: accordo-frontend:staging
    container_name: accordo-frontend-staging
    ports:
      - "${PORT:-5001}:5001"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
