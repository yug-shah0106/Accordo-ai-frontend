services:
  frontend:
    build:
      context: ../../../
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL}
    ports:
      - "${PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
