# Production: frontend only. Build and run static app with nginx.
# Usage: cd docker/compose/production && docker compose up -d --build

services:
  frontend:
    image: ${DOCKER_IMAGE:-accordo-frontend:latest}
    build:
      context: ../..
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-}
        VITE_ASSEST_URL: ${VITE_ASSEST_URL:-}
    container_name: accordo-frontend-production
    ports:
      - "${PORT:-5001}:5001"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
